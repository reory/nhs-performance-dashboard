[pytest]
# Where to look for tests
testpaths = tests

# Tell Pytest that 'app' is a root-level package 
# This prevents "ModuleNotFoundError" when importing from app.main
pythonpath = .

# Standard naming conventions for test files/functions
python_files = test_*.py
python_functions = test_*

# Filter out the noise (crucial for Windows/Git Bash users!)
norecursedirs = venv .venv .git __pycache__ data scripts

# Add helpful CLI flags by default
# -v: Verbose output
# -s: Allow print statements to show in the console (great for debugging)
addopts = -v -s --strict-markers